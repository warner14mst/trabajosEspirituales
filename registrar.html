<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pasarela de Pago Segura</title>
    <style>
        /* Estilos de Estética Bancaria */
        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .card-container {
            background: #ffffff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 400px;
            border-top: 6px solid #004a99; /* Azul Bancario */
        }

        h2 {
            color: #1a1a1a;
            font-size: 20px;
            margin-bottom: 20px;
            text-align: center;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #4b5563;
            margin-bottom: 5px;
        }

        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #d1d5db;
            border-radius: 6px;
            font-size: 15px;
            box-sizing: border-box;
            transition: all 0.3s ease;
        }

        input:focus {
            outline: none;
            border-color: #004a99;
            box-shadow: 0 0 0 3px rgba(0, 74, 153, 0.1);
        }

        .row {
            display: flex;
            gap: 15px;
        }

        .requirement-text {
            font-size: 11px;
            color: #6b7280;
            margin-top: 4px;
            display: block;
        }

        .pay-button {
            width: 100%;
            background-color: #004a99;
            color: white;
            padding: 14px;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
            transition: background 0.2s;
        }

        .pay-button:hover {
            background-color: #003366;
        }

        .secure-info {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 5px;
            margin-top: 15px;
            font-size: 12px;
            color: #10b981; /* Verde éxito */
        }
    </style>
</head>
<body>

<div class="card-container">
    <h2>Finalizar Pago</h2>
    
    <form action="#">
        <div class="form-group">
            <label for="fullname">Nombre y Apellido</label>
            <input type="text" id="fullname" placeholder="Nombre completo del titular" required>
        </div>

        <div class="form-group">
            <label for="pan">Número de Tarjeta (PAN)</label>
            <input type="text" id="pan" maxlength="16" minlength="15" placeholder="0000 0000 0000 0000" required>
            <span class="requirement-text">Mínimo 15-16 dígitos | Ubicación: Frente</span>
        </div>

        <div class="row">
            <div class="form-group" style="flex: 2;">
                <label for="expiry">Vencimiento</label>
                <input type="text" id="expiry" maxlength="5" placeholder="MM/AA" required>
                <span class="requirement-text">4 dígitos (MM/AA) | Frente o Reverso</span>
            </div>

            <div class="form-group" style="flex: 1;">
                <label for="cvv">CVV / CVC</label>
                <input type="text" id="cvv" maxlength="4" minlength="3" placeholder="123" required>
                <span class="requirement-text">3-4 dígitos</span>
            </div>
        </div>

        <button type="submit" class="pay-button">Realizar Pago Seguro</button>

        <div class="secure-info">
            <span>🔒 Conexión cifrada SSL</span>
        </div>
    </form>
</div>

</body>
</html>
